framework:
    rate_limiter:
        # Max 10 new password links created per IP per minute
        password_create:
            policy: sliding_window
            limit: 10
            interval: '1 minute'

        # Max 3 reveal attempts per IP per minute (brute-force protection)
        password_reveal:
            policy: sliding_window
            limit: 3
            interval: '1 minute'

        # Max 5 reveal attempts per secret UUID regardless of IP
        # Prevents distributed brute-force of link-passwords across many IPs
        password_reveal_per_uuid:
            policy: fixed_window
            limit: 5
            interval: '10 minutes'

        # Light limit on GET /show to prevent mass validity enumeration
        password_show:
            policy: sliding_window
            limit: 60
            interval: '1 minute'
